<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Will You Be My Valentine?</title>

    <style>
        *{
          padding: 0;
          margin: 0;
        }

        body{
          background-color: #ffc0cb;
          font-family: Arial, sans-serif;
        }

        h1{
          color: #ff4d6d;
          margin-top: 120px;
          font-size: 6vw;
          text-align: center;
        }

        .first{
          width: 200px;
          display: block;
          margin: 40px auto;
        }

        .form1{
          text-align: center;
        }

        .yes_button{
          background-color: #4CAF50;
          color: white;
          border:none;
          border-radius: 12px;
          margin: 10px 5px;
          transition: all 0.3s ease;
        }

        .no_button{
          background-color: #ff4d6d;
          color: white;
          border:none;
          border-radius: 12px;
          margin: 10px 5px;
          transition: all 0.3s ease;
        }

        .yes_button:active,.no_button:active{
          transform: scale(0.95);
        }
    </style>
</head>

<body>

<h1>Will you be my valentine?💗</h1>

<img class="first" src="{{ url_for('static',filename='images/first_page.jpeg')}}">
<form method="post" class="form1">

style="font-size: {{yes_size}}px; padding: {{yes_size / 2 | int}}px {{yes_size}}px;">

</button>

</form>
